<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="56%">
      <stop offset="0%" stop-color="#FFEAB8" stop-opacity="1"/>
      <stop offset="55%" stop-color="#F6D38A" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#F6D38A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ouro" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6C868"/>
      <stop offset="100%" stop-color="#BA7517"/>
    </linearGradient>
    <linearGradient id="asa" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6E1B0"/>
      <stop offset="100%" stop-color="#E8B967"/>
    </linearGradient>
  </defs>

  <!-- fundo claro com cantos arredondados (app icon) -->
  <rect width="512" height="512" rx="112" fill="#FBFAF7"/>

  <!-- halo radial -->
  <circle cx="256" cy="232" r="200" fill="url(#halo)"/>

  <!-- duas asas espelhadas (folhas em pena) -->
  <g transform="translate(256,250)">
    <!-- asa esquerda -->
    <g transform="scale(-1,1)">
      <path d="M0,-8 C 26,-30 70,-50 122,-46 C 160,-44 184,-22 184,4
               C 184,30 156,52 118,58 C 80,64 38,52 12,30 C 6,24 0,16 0,-8 Z"
            fill="url(#asa)" stroke="#BA7517" stroke-width="3"/>
      <!-- penas (linhas internas) -->
      <path d="M40,-20 C 60,-2 86,8 116,8" fill="none" stroke="#BA7517" stroke-width="2" stroke-linecap="round" opacity=".55"/>
      <path d="M30,-2 C 56,12 88,20 120,20" fill="none" stroke="#BA7517" stroke-width="2" stroke-linecap="round" opacity=".55"/>
      <path d="M22,16 C 50,28 86,32 118,32" fill="none" stroke="#BA7517" stroke-width="2" stroke-linecap="round" opacity=".55"/>
    </g>
    <!-- asa direita -->
    <g>
      <path d="M0,-8 C 26,-30 70,-50 122,-46 C 160,-44 184,-22 184,4
               C 184,30 156,52 118,58 C 80,64 38,52 12,30 C 6,24 0,16 0,-8 Z"
            fill="url(#asa)" stroke="#BA7517" stroke-width="3"/>
      <path d="M40,-20 C 60,-2 86,8 116,8" fill="none" stroke="#BA7517" stroke-width="2" stroke-linecap="round" opacity=".55"/>
      <path d="M30,-2 C 56,12 88,20 120,20" fill="none" stroke="#BA7517" stroke-width="2" stroke-linecap="round" opacity=".55"/>
      <path d="M22,16 C 50,28 86,32 118,32" fill="none" stroke="#BA7517" stroke-width="2" stroke-linecap="round" opacity=".55"/>
    </g>
  </g>

  <!-- estrela/centelha angelical entre as asas -->
  <g transform="translate(256,246)">
    <path d="M0,-46 L8,-8 L46,0 L8,8 L0,46 L-8,8 L-46,0 L-8,-8 Z" fill="url(#ouro)"/>
    <circle cx="0" cy="0" r="10" fill="#FFF7DE"/>
  </g>
</svg>
